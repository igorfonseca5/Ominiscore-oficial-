<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniScore | Live PRO</title>
    <style>
        body { background-color: #0f0f12; color: #f4f4f5; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { color: #10b981; font-size: 26px; font-weight: 800; margin: 20px 0; text-transform: uppercase; letter-spacing: 2px; }
        .card { background-color: #18181b; border-radius: 16px; padding: 20px; width: 95%; max-width: 500px; border: 1px solid #27272a; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .status-badge { color: #10b981; font-size: 11px; font-weight: bold; display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .live-dot { height: 8px; width: 8px; background-color: #10b981; border-radius: 50%; display: inline-block; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .game-name { font-size: 16px; font-weight: bold; color: #fff; margin-bottom: 15px; display: block; text-align: center; border-bottom: 1px solid #27272a; padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-item { background: #202024; padding: 15px 10px; border-radius: 10px; text-align: center; border: 1px solid #27272a; }
        .stat-label { display: block; font-size: 10px; color: #71717a; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { display: block; color: #10b981; font-size: 18px; font-weight: bold; }
        .danger { color: #f59e0b; }
    </style>
</head>
<body>

    <div class="header">OmniScore</div>

    <div class="card">
        <div class="status-badge"><span class="live-dot"></span> NANO DRAGO: DADOS REAIS</div>
        <span class="game-name" id="game-title">Buscando jogo ativo...</span>
        
        <div class="stats-grid">
            <div class="stat-item"><span class="stat-label">Placar Total</span><span class="stat-value" id="val-gols">--</span></div>
            <div class="stat-item"><span class="stat-label">Escanteios</span><span class="stat-value" id="val-cantos">--</span></div>
            <div class="stat-item"><span class="stat-label">Cartões</span><span class="stat-value danger" id="val-cartoes">--</span></div>
            <div class="stat-item"><span class="stat-label">Chutes no Alvo</span><span class="stat-value" id="val-chutes">--</span></div>
            <div class="stat-item"><span class="stat-label">Posse de Bola</span><span class="stat-value" id="val-posse">--</span></div>
            <div class="stat-item"><span class="stat-label">Tempo</span><span class="stat-value" id="val-tempo">--</span></div>
        </div>
    </div>

    <script>
        const apiKey = 'b66631fe778bd4e49067343b5b234e44';

        async function atualizarOmniScore() {
            try {
                const response = await fetch('ominiscore-oficial-production.up.railway.app', {
                    "method": "GET",
                    "headers": {
                        "x-rapidapi-host": "v3.football.api-sports.io",
                        "x-rapidapi-key": apiKey
                    }
                });

                const data = await response.json();

                if (data.response && data.response.length > 0) {
                    const jogo = data.response[0]; // Pega o primeiro jogo ao vivo encontrado
                    
                    // Nomes dos Times
                    document.getElementById('game-title').innerText = jogo.teams.home.name + " vs " + jogo.teams.away.name;
                    
                    // Gols
                    document.getElementById('val-gols').innerText = (jogo.goals.home + jogo.goals.away);
                    
                    // Tempo
                    document.getElementById('val-tempo').innerText = jogo.fixture.status.elapsed + "'";

                    // Estatísticas detalhadas (precisamos procurar no array de statistics)
                    if (jogo.statistics && jogo.statistics.length > 0) {
                        const sHome = jogo.statistics[0].statistics;
                        const sAway = jogo.statistics[1].statistics;

                        const getStat = (arrHome, arrAway, type) => {
                            const vH = arrHome.find(s => s.type === type)?.value || 0;
                            const vA = arrAway.find(s => s.type === type)?.value || 0;
                            return { total: (parseInt(vH) + parseInt(vA)), home: vH };
                        };

                        document.getElementById('val-cantos').innerText = getStat(sHome, sAway, "Corner Kicks").total + " Un";
                        document.getElementById('val-cartoes').innerText = (getStat(sHome, sAway, "Yellow Cards").total + getStat(sHome, sAway, "Red Cards").total) + " Un";
                        document.getElementById('val-chutes').innerText = getStat(sHome, sAway, "Shots on Goal").total;
                        document.getElementById('val-posse').innerText = sHome.find(s => s.type === "Ball Possession")?.value || "50%";
                    } else {
                        // Se o jogo for de uma liga menor sem stats detalhadas, mostra o básico
                        document.getElementById('val-cantos').innerText = "N/A";
                        document.getElementById('val-cartoes').innerText = "Ver no App";
                        document.getElementById('val-chutes').innerText = "Aguardando";
                        document.getElementById('val-posse').innerText = "50/50";
                    }

                } else {
                    document.getElementById('game-title').innerText = "Sem jogos ao vivo no momento";
                }
            } catch (error) {
                document.getElementById('game-title').innerText = "Erro na API";
            }
        }

        // Atualiza a cada 30 segundos (pra ser rápido, mas sem travar a conta gratuita)
        setInterval(atualizarOmniScore, 30000);
        atualizarOmniScore();
    </script>
</body>
</html>
